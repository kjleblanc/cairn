name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm ci
        working-directory: app
      - run: npm run make
        working-directory: app
      - uses: softprops/action-gh-release@v2
        with:
          files: app/out/make/**/*
          draft: true
